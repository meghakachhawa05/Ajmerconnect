{% extends "booking/base.html" %}

{% block title %}Venues{% endblock %}

{% block content %}
<div class="container">
    <h1>Available Venues</h1>
    <ul class="venue-list">
        {% for venue in venues %}
        <li>
            <a href="{% url 'booking:venue_detail' venue.id %}">{{ venue.name }}</a>
            <p>{{ venue.description|truncatewords:20 }}</p>
        </li>
        {% empty %}
        <li>No venues available.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
