{% extends "booking/base.html" %}

{% block title %}Confirm Booking{% endblock %}

{% block content %}
<div class="container">
    <h1>Confirm Your Booking</h1>
    <p><strong>Venue:</strong> {{ slot.venue.name }}</p>
    <p><strong>Date:</strong> {{ slot.date }}</p>
    <p><strong>Time:</strong> {{ slot.start_time }} - {{ slot.end_time }}</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">Confirm Booking</button>
        <a href="{% url 'booking:venue_detail' slot.venue.id %}" class="btn cancel">Cancel</a>
    </form>
</div>
{% endblock %}
