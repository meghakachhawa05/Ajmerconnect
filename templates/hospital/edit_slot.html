{% extends 'hospital/base.html' %}

{% block title %}Edit Time Slot{% endblock %}

{% block content %}
<div class="card">
    <h2>Edit Time Slot</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="start_time">Start Time:</label>
            <input type="time" id="start_time" name="start_time" value="{{ slot.start_time|time:'H:i' }}" required>
        </div>
        <div class="form-group">
            <label for="end_time">End Time:</label>
            <input type="time" id="end_time" name="end_time" value="{{ slot.end_time|time:'H:i' }}" required>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_available" {% if slot.is_available %}checked{% endif %}>
                Available
            </label>
        </div>
        <button type="submit" class="btn">Save Changes</button>
        <a href="{% url 'hospital:doctor_details' slot.doctor.id %}" class="btn btn-danger">Cancel</a>
    </form>
</div>
{% endblock %}
