{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Amenity Admin{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #0f3d3e;
            position: fixed;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #1f6f70;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Amenity Admin</h4>
    <hr>

    <a href="{% url 'amenity:admin_dashboard' %}">
        <i class="fas fa-chart-line me-2"></i> Dashboard
    </a>

    <a href="{% url 'amenity:admin_list' %}">
        <i class="fas fa-list me-2"></i> All Amenities
    </a>

    <a href="{% url 'amenity:admin_add' %}">
        <i class="fas fa-plus me-2"></i> Add Amenity
    </a>

    <a href="{% url 'amenity:add_to_map' %}">
        <i class="fas fa-map me-2"></i> Add to Map
    </a>

    <a href="{% url 'core:home' %}">
        <i class="fas fa-home me-2"></i> Back to Site
    </a>
</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- GLOBAL JS -->
<script src="{% static 'core/js/main.js' %}"></script>

<!-- OPTIONAL PAGE JS -->
{% block extra_js %}{% endblock %}

</body>
</html>
